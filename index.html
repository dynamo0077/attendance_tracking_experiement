<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Attendance Manager</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#ffffff;
      --header:#1565c0;
      --teal:#00897b;
      --border:#d0d7de;
      --text:#1f2937;
      --muted:#6b7280;
      --pending:#fff8e1;
      --verified:#e6f4ea;
      --absent:#ffffff;
      --defaulter:#fce8e6;
      --hover:#eaf4ff;
      --shadow:0 8px 24px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f8fb;color:var(--text)}
    .topbar{background:var(--header);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .topbar .title{font-weight:700;letter-spacing:.2px}
    .topbar .user{font-size:14px;opacity:.95}
    .switch-link{color:#d7ecff;text-decoration:none;font-size:14px;margin-left:auto}
    .switch-link:hover{text-decoration:underline}
    .wrap{max-width:1400px;margin:18px auto;padding:0 14px}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:16px;align-items:start}
    .panel,.sidebar{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
    .panel-inner{padding:16px}
    .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end;margin-bottom:14px}
    .field{display:flex;flex-direction:column;gap:6px}
    label{font-size:12px;color:var(--muted)}
    select,input[type="number"],input[type="text"]{border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;background:#fff;min-height:42px}
    .grid-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px}
    .attendance-grid{display:grid;min-width:max-content}
    .cell,.rowhdr,.colhdr{border-right:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;min-height:36px;display:flex;align-items:center;justify-content:center;padding:4px 6px;font-size:13px}
    .rowhdr,.colhdr{background:#f8fafc;font-weight:600}
    .rowhdr{justify-content:flex-start;min-width:160px;position:sticky;left:0;z-index:2}
    .colhdr{min-width:34px;position:sticky;top:0;z-index:1}
    .corner{background:#f8fafc;position:sticky;left:0;top:0;z-index:3;min-width:160px}
    .cell{min-width:34px;cursor:pointer;user-select:none;background:var(--absent)}
    .cell:hover{background:var(--hover)}
    .cell.pending{background:var(--pending)}
    .cell.verified{background:var(--verified)}
    .status-dot{width:10px;height:10px;border-radius:999px;display:inline-block}
    .pending .status-dot{background:#f4c542}
    .verified .status-dot{background:#34a853}
    .absent .status-dot{background:#c7c7c7}
    .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:13px;color:var(--muted)}
    .legend span{display:inline-flex;align-items:center;gap:6px}
    .sidebar{background:var(--defaulter);border:1px solid #f5c2c0}
    .sidebar h2{margin:0;padding:16px 16px 0;font-size:18px}
    .sidebar-inner{padding:14px 16px 16px}
    .badge-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
    .pill{background:#fff;border:1px solid #f0b8b2;border-radius:999px;padding:10px 12px;font-size:14px;display:flex;justify-content:space-between;gap:12px}
    .muted{color:var(--muted)}
    .overlay{position:fixed;inset:0;background:rgba(255,255,255,.96);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
    .overlay.active{display:flex}
    .card{width:min(420px,100%);background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:var(--shadow);padding:20px}
    .card h1{margin:0 0 8px;font-size:24px}
    .choices{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    button{border:0;border-radius:12px;padding:11px 14px;font:inherit;cursor:pointer}
    .primary{background:var(--header);color:#fff}
    .secondary{background:#e8f2ff;color:#0f4fa8}
    .confirm{background:var(--teal);color:#fff}
    .toast{position:fixed;right:16px;bottom:16px;background:#1f2937;color:#fff;padding:10px 14px;border-radius:12px;box-shadow:var(--shadow);display:none;z-index:60;font-size:14px}
    .toast.show{display:block}
    .name-row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
    @media (max-width: 900px){
      .layout{grid-template-columns:1fr}
      .sidebar{order:2}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Shared Attendance Manager</div>
    <div class="user" id="userInfo">Logged in as: —</div>
    <a href="#" class="switch-link" id="switchRoleLink">Switch role</a>
  </div>

  <div class="wrap">
    <div class="layout">
      <section class="panel">
        <div class="panel-inner">
          <div class="controls">
            <div class="field">
              <label for="monthSelect">Month</label>
              <select id="monthSelect"></select>
            </div>
            <div class="field">
              <label for="yearInput">Year</label>
              <input id="yearInput" type="number" min="2000" max="2100" />
            </div>
          </div>
          <div class="grid-wrap">
            <div id="grid" class="attendance-grid"></div>
          </div>
          <div class="legend">
            <span><i class="status-dot" style="background:#f4c542"></i> yellow = pending</span>
            <span><i class="status-dot" style="background:#34a853"></i> green = verified</span>
            <span><i class="status-dot" style="background:#c7c7c7"></i> gray = absent</span>
          </div>
        </div>
      </section>

      <aside class="sidebar">
        <h2>Defaulters this month</h2>
        <div class="sidebar-inner">
          <div id="defaulters" class="badge-list"></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="overlay" id="roleOverlay">
    <div class="card">
      <h1>Choose your role</h1>
      <p class="muted">This is saved on your device only.</p>
      <div class="choices">
        <button class="primary" id="managerBtn">I am Manager</button>
        <button class="secondary" id="employeeBtn">I am Employee</button>
      </div>
      <div id="namePrompt" style="display:none;margin-top:18px">
        <div class="name-row">
          <div class="field" style="flex:1;min-width:220px">
            <label for="employeeNameInput">Employee name</label>
            <input id="employeeNameInput" type="text" placeholder="Enter your name" />
          </div>
          <button class="confirm" id="nameConfirmBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Sync failed, retrying...</div>

  <script>
    const SUPABASE_URL = "https://zmdlwnrjvthhcfcnjkmo.supabase.co";
    const SUPABASE_KEY = "sb_publishable_4RA60NfJWA-4xUS1VKF9yw_h3ZatrnX";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const state = {
      role: null,
      name: null,
      year: new Date().getFullYear(),
      month: new Date().getMonth() + 1,
      data: [],
      employees: []
    };

    const els = {
      roleOverlay: document.getElementById('roleOverlay'),
      managerBtn: document.getElementById('managerBtn'),
      employeeBtn: document.getElementById('employeeBtn'),
      namePrompt: document.getElementById('namePrompt'),
      employeeNameInput: document.getElementById('employeeNameInput'),
      nameConfirmBtn: document.getElementById('nameConfirmBtn'),
      switchRoleLink: document.getElementById('switchRoleLink'),
      userInfo: document.getElementById('userInfo'),
      monthSelect: document.getElementById('monthSelect'),
      yearInput: document.getElementById('yearInput'),
      grid: document.getElementById('grid'),
      defaulters: document.getElementById('defaulters'),
      toast: document.getElementById('toast')
    };

    function safeLocalGet(k){ try { return localStorage.getItem(k); } catch { return null; } }
    function safeLocalSet(k,v){ try { localStorage.setItem(k,v); } catch {} }
    function safeLocalRemove(k){ try { localStorage.removeItem(k); } catch {} }

    function showToast(){
      els.toast.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(()=>els.toast.classList.remove('show'), 2200);
    }

    function keyYearMonth(y,m){ return `${y}-${String(m).padStart(2,'0')}`; }

    function openRoleScreen(){
      els.roleOverlay.classList.add('active');
      els.namePrompt.style.display = 'none';
    }
    function closeRoleScreen(){ els.roleOverlay.classList.remove('active'); }

    function initMonthYear(){
      els.monthSelect.innerHTML = MONTHS.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
      els.monthSelect.value = String(state.month);
      els.yearInput.value = String(state.year);
    }

    async function loadEmployees(){
      try{
        const { data, error } = await sb.from('employees').select('name').order('name', { ascending: true });
        if (error) throw error;
        state.employees = (data || []).map(x => x.name);
      } catch (e){
        showToast();
      }
    }

    async function loadAttendance(){
      try{
        const { data, error } = await sb
          .from('attendance')
          .select('employee_name, day, status')
          .eq('year', state.year)
          .eq('month', state.month);
        if (error) throw error;
        state.data = data || [];
      } catch (e){
        showToast();
      }
    }

    async function ensureEmployeeExists(name){
      if (!name) return;
      try{
        const { error } = await sb.from('employees').upsert({ name }, { onConflict: 'name' });
        if (error) throw error;
      } catch (e){
        showToast();
      }
    }

    function daysInMonth(year, month){
      return new Date(year, month, 0).getDate();
    }

    function getStatus(name, day){
      const found = state.data.find(r => r.employee_name === name && Number(r.day) === Number(day));
      return found ? found.status : '';
    }

    function visibleEmployees(){
      if (state.role === 'Employee' && state.name) return [state.name];
      return state.employees;
    }

    function render(){
      els.userInfo.textContent = `Logged in as: ${state.name || '—'} (${state.role || '—'})`;

      const dim = daysInMonth(state.year, state.month);
      const names = visibleEmployees().filter(Boolean);
      els.grid.style.gridTemplateColumns = `160px repeat(${dim}, 34px)`;

      let html = `<div class="corner colhdr">Employee</div>`;
      for (let d = 1; d <= dim; d++) html += `<div class="colhdr">${d}</div>`;

      for (const name of names){
        html += `<div class="rowhdr">${name}</div>`;
        for (let d = 1; d <= dim; d++){
          const status = getStatus(name, d);
          const cls = status === 'verified' ? 'verified' : status === 'marked' ? 'pending' : 'absent';
          html += `
            <div class="cell ${cls}" data-name="${encodeURIComponent(name)}" data-day="${d}" title="${name} - ${d}">
              <span class="status-dot"></span>
            </div>`;
        }
      }

      els.grid.innerHTML = html;
      renderDefaulters();
    }

    function renderDefaulters(){
      const counts = {};
      for (const row of state.data){
        if (!counts[row.employee_name]) counts[row.employee_name] = 0;
        if (row.status === 'marked' || row.status === 'verified') counts[row.employee_name]++;
      }

      const list = Object.entries(counts)
        .filter(([_, count]) => count < 20)
        .map(([name, count]) => ({ name, count }))
        .sort((a,b) => a.name.localeCompare(b.name));

      if (!list.length){
        els.defaulters.innerHTML = `<div class="muted">No defaulters this month 🎉</div>`;
        return;
      }

      els.defaulters.innerHTML = list.map(x => `
        <div class="pill">
          <span>${x.name}</span>
          <span>${x.count} days</span>
        </div>
      `).join('');
    }

    async function refresh(){
      try{
        await Promise.all([loadEmployees(), loadAttendance()]);
        if (state.role === 'Employee' && state.name) await ensureEmployeeExists(state.name);
        await loadEmployees();
        render();
      } catch (e){
        showToast();
      }
    }

    async function onCellClick(e){
      const cell = e.target.closest('.cell');
      if (!cell) return;

      const name = decodeURIComponent(cell.dataset.name);
      const day = Number(cell.dataset.day);
      const current = getStatus(name, day);

      try{
        if (state.role === 'Manager'){
          if (current === 'marked'){
            await sb.from('attendance')
              .upsert({
                year: state.year,
                month: state.month,
                employee_name: name,
                day,
                status: 'verified',
                updated_at: new Date().toISOString()
              }, { onConflict: 'year,month,employee_name,day' });
          } else if (current === 'verified'){
            await sb.from('attendance')
              .upsert({
                year: state.year,
                month: state.month,
                employee_name: name,
                day,
                status: 'marked',
                updated_at: new Date().toISOString()
              }, { onConflict: 'year,month,employee_name,day' });
          }
        } else {
          if (name !== state.name) return;
          if (current){
            await sb.from('attendance')
              .delete()
              .eq('year', state.year)
              .eq('month', state.month)
              .eq('employee_name', name)
              .eq('day', day);
          } else {
            await sb.from('attendance')
              .upsert({
                year: state.year,
                month: state.month,
                employee_name: name,
                day,
                status: 'marked',
                updated_at: new Date().toISOString()
              }, { onConflict: 'year,month,employee_name,day' });
          }
        }
        await refresh();
      } catch (e){
        showToast();
      }
    }

    els.monthSelect.addEventListener('change', async () => {
      state.month = Number(els.monthSelect.value);
      await refresh();
    });

    els.yearInput.addEventListener('change', async () => {
      state.year = Number(els.yearInput.value || new Date().getFullYear());
      await refresh();
    });

    els.grid.addEventListener('click', onCellClick);

    els.switchRoleLink.addEventListener('click', (e) => {
      e.preventDefault();
      safeLocalRemove('attendance_role');
      safeLocalRemove('attendance_name');
      state.role = null;
      state.name = null;
      openRoleScreen();
      render();
    });

    els.managerBtn.addEventListener('click', async () => {
      state.role = 'Manager';
      state.name = 'Manager';
      safeLocalSet('attendance_role', state.role);
      safeLocalSet('attendance_name', state.name);
      closeRoleScreen();
      await refresh();
    });

    els.employeeBtn.addEventListener('click', () => {
      els.namePrompt.style.display = 'block';
      els.employeeNameInput.focus();
    });

    els.nameConfirmBtn.addEventListener('click', async () => {
      const name = els.employeeNameInput.value.trim();
      if (!name) return;
      state.role = 'Employee';
      state.name = name;
      safeLocalSet('attendance_role', state.role);
      safeLocalSet('attendance_name', state.name);
      await ensureEmployeeExists(name);
      closeRoleScreen();
      await refresh();
    });

    els.employeeNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') els.nameConfirmBtn.click();
    });

    function loadIdentity(){
      state.role = safeLocalGet('attendance_role');
      state.name = safeLocalGet('attendance_name');
    }

    async function boot(){
      loadIdentity();
      initMonthYear();

      if (!state.role || !state.name){
        openRoleScreen();
      } else {
        await refresh();
      }

      setInterval(refresh, 5000);
    }

    boot();
  </script>
</body>
</html>
